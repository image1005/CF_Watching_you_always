<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2d0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="pupilGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#330000;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- 眼睛外轮廓 -->
  <ellipse cx="128" cy="128" rx="120" ry="80" fill="url(#eyeGradient)" stroke="#000" stroke-width="3"/>
  
  <!-- 眼白/血丝效果 -->
  <ellipse cx="128" cy="128" rx="100" ry="60" fill="#1a0000" opacity="0.3"/>
  
  <!-- 瞳孔 -->
  <circle cx="128" cy="128" r="35" fill="url(#pupilGradient)"/>
  
  <!-- 瞳孔中心亮点 -->
  <circle cx="118" cy="118" r="8" fill="#ff0000" opacity="0.8"/>
  
  <!-- 血丝 -->
  <path d="M40 100 Q60 110 80 105" stroke="#8b0000" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M50 140 Q70 130 90 135" stroke="#8b0000" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M176 105 Q196 110 216 100" stroke="#8b0000" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M166 135 Q186 130 206 140" stroke="#8b0000" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- 上眼睑阴影 -->
  <ellipse cx="128" cy="128" rx="120" ry="80" fill="none" stroke="#000" stroke-width="4"/>
  <path d="M8 128 Q128 40 248 128" stroke="#000" stroke-width="3" fill="none"/>
</svg>